name: Docker Image CI

on:
  release:
    types: [created]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Configure private modules
      run: |
        git config --global url."https://${{ secrets.GO_PRIVATE_TOKEN }}@github.com/".insteadOf "https://github.com/"
        go env -w GOPRIVATE=github.com/glimps-re/*
 
    - name: Build binary for Docker
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -ldflags="-s -w -X main.Version=${{ github.ref_name }}" \
          -o rdap-lookup ./cmd/rdap-lookup
        chmod +x rdap-lookup

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to Harbor
      uses: docker/login-action@v3
      with:
        registry: updates.glimps.re
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      if: '!github.event.release.prerelease'
      with:
        context: .
        push: true
        tags: |
          glimpsre/rdap-lookup:${{ github.ref_name }}
          glimpsre/rdap-lookup:latest
          updates.glimps.re/ges/rdap-lookup:${{ github.ref_name }}
          updates.glimps.re/ges/rdap-lookup:latest

    - name: Build and push Docker image (pre-release)
      uses: docker/build-push-action@v6
      if: 'github.event.release.prerelease'
      with:
        context: .
        push: true
        tags: |
          glimpsre/rdap-lookup:${{ github.ref_name }}
          updates.glimps.re/ges/rdap-lookup:${{ github.ref_name }}
